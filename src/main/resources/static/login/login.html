<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>로그인</title>

    <link rel="stylesheet" href="login.css">
</head>

<body>

<div class="login-container">

    <div class="top-bar">

        <button class="back-btn"
                onclick="location.href='../index.html'">
            〈
        </button>

    </div>

    <h1>만나서 반가워요!</h1>


    <input id="userid"
           placeholder="아이디">

    <input id="password"
           type="password"
           placeholder="비밀번호">

    <button id="loginBtn">
        로그인
    </button>

    <div class="bottom-menu">

        <button onclick="location.href='../signup/signup.html'">
            회원가입
        </button>

    </div>

</div>

<script src="login.js"></script>

</body>
</html>
